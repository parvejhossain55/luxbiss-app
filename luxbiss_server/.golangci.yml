run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - typecheck
    - unused
    - gofmt
    - goimports
    - misspell
    - unconvert

linters-settings:
  errcheck:
    check-type-assertions: true
  govet:
    check-shadowing: true
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/parvej/luxbiss_server

issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
