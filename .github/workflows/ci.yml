name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - dev

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxbiss_frontend
    env:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api/v1
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-placeholder-client-id
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: luxbiss_frontend/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: luxbiss_server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: luxbiss_server/go.mod
          cache-dependency-path: luxbiss_server/go.sum

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test -count=1 ./...

      - name: Build
        run: go build ./cmd/api

  container:
    name: Container Build
    runs-on: ubuntu-latest
    needs:
      - frontend
      - backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: luxbiss:ci
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=http://localhost:8080/api/v1
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=ci-placeholder-client-id
