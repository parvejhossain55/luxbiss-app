name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  publish:
    name: Publish Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL || 'http://localhost:8080/api/v1' }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID || 'ci-placeholder-client-id' }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: publish
    if: ${{ secrets.DEPLOY_HOST != '' && secrets.DEPLOY_USER != '' && secrets.DEPLOY_SSH_KEY != '' && secrets.GHCR_DEPLOY_USER != '' && secrets.GHCR_DEPLOY_TOKEN != '' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_URI: ghcr.io/${{ github.repository }}:latest
          GHCR_DEPLOY_USER: ${{ secrets.GHCR_DEPLOY_USER }}
          GHCR_DEPLOY_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
          APP_PORT: ${{ secrets.APP_PORT || '8080' }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME || 'luxbiss-api' }}
          ENV_FILE_PATH: ${{ secrets.ENV_FILE_PATH || '/opt/luxbiss/.env' }}
          UPLOADS_PATH: ${{ secrets.UPLOADS_PATH || '/opt/luxbiss/uploads' }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          envs: IMAGE_URI,GHCR_DEPLOY_USER,GHCR_DEPLOY_TOKEN,APP_PORT,CONTAINER_NAME,ENV_FILE_PATH,UPLOADS_PATH
          script_stop: true
          script: |
            set -eu
            test -f "$ENV_FILE_PATH"
            mkdir -p "$UPLOADS_PATH"
            echo "$GHCR_DEPLOY_TOKEN" | docker login ghcr.io -u "$GHCR_DEPLOY_USER" --password-stdin
            docker pull "$IMAGE_URI"
            docker rm -f "$CONTAINER_NAME" || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$APP_PORT:8080" \
              --env-file "$ENV_FILE_PATH" \
              -v "$UPLOADS_PATH:/app/public/uploads" \
              "$IMAGE_URI"
            docker image prune -f
