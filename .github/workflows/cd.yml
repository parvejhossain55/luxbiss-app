name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cd-main
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
            NEXT_PUBLIC_GOOGLE_CLIENT_ID=${{ secrets.NEXT_PUBLIC_GOOGLE_CLIENT_ID }}

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_URI: ghcr.io/${{ github.repository }}:latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          APP_PORT: ${{ secrets.APP_PORT || '8080' }}
          CONTAINER_NAME: ${{ secrets.CONTAINER_NAME || 'luxbiss-api' }}
          ENV_FILE_PATH: ${{ secrets.ENV_FILE_PATH || '/opt/luxbiss/.env' }}
          UPLOADS_PATH: ${{ secrets.UPLOADS_PATH || '/opt/luxbiss/uploads' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_URI,GITHUB_TOKEN,GITHUB_ACTOR,APP_PORT,CONTAINER_NAME,ENV_FILE_PATH,UPLOADS_PATH
          script_stop: true
          script: |
            set -eu
            # Ensure uploads directory exists and login to registry
            mkdir -p "$UPLOADS_PATH"
            echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin
            
            # Pull new image
            docker pull "$IMAGE_URI"
            
            # Restart container
            docker rm -f "$CONTAINER_NAME" || true
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p "$APP_PORT:8080" \
              --env-file "$ENV_FILE_PATH" \
              -v "$UPLOADS_PATH:/app/public/uploads" \
              "$IMAGE_URI"
            
            # Clean up old images
            docker image prune -f